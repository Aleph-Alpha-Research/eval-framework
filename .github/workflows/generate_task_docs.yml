name: Generate task docs

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  HF_DATASET_CACHE_DIR: /tmp/huggingface_datasets
  UV_LINK_MODE: symlink
  UV_LOCKED: 1

jobs:
  generate-and-pr:
    permissions:
      contents: write
      pull-requests: write
    runs-on: cpu-runner-8c-32gb-01
    steps:
      - name: Create bot token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: bot-token
        with:
          app-id: ${{ vars.AAR_PUBLIC_VERSION_BUMP_BOT_APP_ID }}
          private-key: ${{ secrets.AAR_PUBLIC_VERSION_BUMP_BOT_PRIVATE_KEY }}
          repositories: |
            eval-framework

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "~=0.8.16"

      - name: Restore Huggingface datasets cache
        uses: actions/cache@v5
        with:
          path: ${{ env.HF_DATASET_CACHE_DIR }}
          key: hf-datasets

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate task docs
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: uv run python -m eval_framework.utils.generate_task_docs

      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.bot-token.outputs.token }}
          base: ${{ github.ref_name }}
          commit-message: "chore: regenerate task docs"
          branch: task-docs-auto-update
          delete-branch: true
          title: "chore: update generated task docs"
          body: "Auto-generated by the **Generate task docs** workflow. Updates markdown under `docs/tasks/`."
          add-paths: |
            docs/tasks

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: gh pr merge --auto --squash "${{ steps.pr.outputs.pull-request-number }}"
