name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.detignore'
      - '**/*.detignore'
      - '*.example'
      - '**/*.example'
      - '*.json'
      - '**/*.json'
      - '*.md'
      - '**/*.md'
      - '*.png'
      - '**/*.png'
      - '*.sample'
      - '**/*.sample'
      - '*.TAG'
      - '**/*.TAG'
      - '*.yaml'
      - '**/*.yaml'
      - '*.yml'
      - '**/*.yml'
      - '!/.github/workflows/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'changelog/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.detignore'
      - '**/*.detignore'
      - '*.example'
      - '**/*.example'
      - '*.json'
      - '**/*.json'
      - '*.md'
      - '**/*.md'
      - '*.png'
      - '**/*.png'
      - '*.sample'
      - '**/*.sample'
      - '*.TAG'
      - '**/*.TAG'
      - '*.yaml'
      - '**/*.yaml'
      - '*.yml'
      - '**/*.yml'
      - '!/.github/workflows/**'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'changelog/**'
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER_LC: aleph-alpha-research
  IMAGE_NAME: eval_framework_public
  HF_DATASET_CACHE_DIR: /tmp/huggingface_datasets

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.out.outputs.PR_NUMBER }}
      tag: ${{ steps.out.outputs.TAG }}
      is_fork: ${{ steps.out.outputs.IS_FORK }}
    steps:
      - id: out
        shell: bash
        run: |
          echo "=== DEBUG START ==="
          echo "Event Name: ${{ github.event_name }}"
          echo "Event Action: ${{ github.event.action }}"
          echo "Repository: ${{ github.repository }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "Is Fork (raw): ${{ github.event.pull_request.head.repo.fork }}"
          echo "=== DEBUG END ==="

          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "pull_request_target" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
              IS_FORK="true"
            else
              IS_FORK="false"
            fi
          else
            PR_NUMBER=""
            HEAD_SHA=""
            IS_FORK="false"
          fi

          echo "=== COMPUTED VALUES ==="
          echo "PR_NUMBER=$PR_NUMBER"
          echo "IS_FORK=$IS_FORK"
          echo "HEAD_SHA=$HEAD_SHA"

          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "IS_FORK=$IS_FORK" >> "$GITHUB_OUTPUT"

          if [[ -n "$PR_NUMBER" ]]; then
            TAG="pr-${PR_NUMBER}-${HEAD_SHA}"
          else
            TAG="latest"
          fi

          echo "TAG=$TAG"
          echo "=== END COMPUTED VALUES ==="

          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

  debug-outputs:
    needs: [decide]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Show outputs
        run: |
          echo "=== OUTPUTS FROM DECIDE ==="
          echo "pr_number: ${{ needs.decide.outputs.pr_number }}"
          echo "tag: ${{ needs.decide.outputs.tag }}"
          echo "is_fork: ${{ needs.decide.outputs.is_fork }}"
          echo "is_fork == 'true': ${{ needs.decide.outputs.is_fork == 'true' }}"
          echo "is_fork != 'true': ${{ needs.decide.outputs.is_fork != 'true' }}"
          echo "=== CONTEXT INFO ==="
          echo "event_name: ${{ github.event_name }}"
          echo "ref: ${{ github.ref }}"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup poetry
        uses: ./.github/actions/setup-poetry-on-ubuntu
      - name: Run Pre-Commit
        run: |
          poetry run pre-commit install
          poetry run pre-commit run -a
      - name: Run MyPy
        run: |
          poetry run mypy src tests utils

  hf-datasets-cache:
    if: github.repository_owner == 'Aleph-Alpha-Research' && github.ref == 'refs/heads/main'
    runs-on: cpu-runner-8c-32gb-01
    container: derskythe/github-runner-base:ubuntu-noble
    needs: [decide]
    steps:
      - uses: actions/checkout@v4
      - name: Setup poetry
        uses: ./.github/actions/setup-poetry-on-ubuntu
        with:
          github-repo-token: ${{ secrets.TOKEN_AA_GITHUB_REPO_READER }}
      - name: Huggingface datasets cache
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_DATASET_CACHE_DIR }}
          key: hf-datasets-${{ github.run_id }}
          restore-keys: |
            hf-datasets-
      - name: Download datasets
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          export PATH=$HOME/.local/bin:$PATH
          poetry run python -c "from eval_framework.task_names import make_sure_all_hf_datasets_are_in_cache; make_sure_all_hf_datasets_are_in_cache()"

  build_regular:
    needs: [decide]
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && needs.decide.outputs.is_fork != 'true')
    runs-on: cpu-runner-8c-32gb-01
    permissions:
      contents: read
      packages: write
    steps:
      - name: Debug why this might be skipped
        if: always()
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Is fork output: ${{ needs.decide.outputs.is_fork }}"
          echo "Condition 1 (push): ${{ github.event_name == 'push' }}"
          echo "Condition 2a (PR): ${{ github.event_name == 'pull_request' }}"
          echo "Condition 2b (not fork): ${{ needs.decide.outputs.is_fork != 'true' }}"
          echo "Full condition: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && needs.decide.outputs.is_fork != 'true') }}"
      - uses: actions/checkout@v4
      - name: Login to GHCR (owner)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push (immutable tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ needs.decide.outputs.tag }}

  publish_fork_image:
    needs: [decide]
    if: >
      (
        github.event_name == 'pull_request_target' &&
        needs.decide.outputs.is_fork == 'true' &&
        (
          (github.event.action == 'labeled' && github.event.label.name == 'trusted_contributor') ||
          (
            contains(github.event.pull_request.labels.*.name, 'trusted_contributor') &&
            (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize')
          )
        )
      ) ||
      (
        github.event_name == 'pull_request' &&
        needs.decide.outputs.is_fork == 'true' &&
        contains(github.event.pull_request.labels.*.name, 'trusted_contributor')
      )
    runs-on: cpu-runner-8c-32gb-01
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout PR HEAD (no creds)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (only on pull_request_target)
        if: github.event_name == 'pull_request_target'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          SHORT=${SHA:0:8}
          echo "tag=${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:pr-${{ needs.decide.outputs.pr_number }}-${SHORT}" >> $GITHUB_OUTPUT

      - name: Build & push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # only push when secrets are available
          push: ${{ github.event_name == 'pull_request_target' }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tag }}

  debug-pr-labels:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    steps:
      - name: Show PR labels
        run: |
          echo "=== PR LABELS DEBUG ==="
          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo ""
          echo "All PR labels (JSON):"
          echo '${{ toJson(github.event.pull_request.labels) }}'
          echo ""
          echo "Label names only:"
          echo '${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo ""
          echo "Has trusted_contributor label: ${{ contains(github.event.pull_request.labels.*.name, 'trusted_contributor') }}"
          echo ""
          if [[ "${{ github.event.action }}" == "labeled" ]]; then
            echo "Just added label: ${{ github.event.label.name }}"
          fi
          echo "=== END PR LABELS DEBUG ==="

  test-cpu:
    needs: [decide, lint]
    if: >
      always() &&
      needs.decide.result == 'success' &&
      needs.lint.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && needs.decide.outputs.is_fork != 'true') ||
        (github.event_name == 'pull_request_target' && needs.decide.outputs.is_fork == 'true' &&
         contains(github.event.pull_request.labels.*.name, 'trusted_contributor')) ||
        (github.event_name == 'pull_request' && needs.decide.outputs.is_fork == 'true' &&
         contains(github.event.pull_request.labels.*.name, 'trusted_contributor'))
      )
    runs-on: cpu-runner-8c-32gb-01
    container: derskythe/github-runner-base:ubuntu-noble
    steps:
      - name: Wait for HF datasets cache on main
        if: github.repository_owner == 'Aleph-Alpha-Research' && github.ref == 'refs/heads/main'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: hf-datasets-cache
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && format('refs/pull/{0}/merge', github.event.pull_request.number) || '' }}
          fetch-depth: 0
      - name: Setup poetry
        uses: ./.github/actions/setup-poetry-on-ubuntu
      - name: Huggingface datasets cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HF_DATASET_CACHE_DIR }}
          key: hf-datasets-
      - name: Run tests
        run: |
          export HF_TOKEN=${{ secrets.HUGGINGFACE_API_KEY }}
          export HF_DATASET_CACHE_DIR=${{ env.HF_DATASET_CACHE_DIR }}
          export PATH=$HOME/.local/bin:$PATH
          poetry run pytest --durations=30 -v -m "not gpu and not cpu_slow and not external_api"

  test-cpu-slow:
    needs: [decide, lint]
    if: >
      always() &&
      needs.decide.result == 'success' &&
      needs.lint.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && needs.decide.outputs.is_fork != 'true') ||
        (github.event_name == 'pull_request_target' && needs.decide.outputs.is_fork == 'true' &&
         contains(github.event.pull_request.labels.*.name, 'trusted_contributor')) ||
        (github.event_name == 'pull_request' && needs.decide.outputs.is_fork == 'true' &&
         contains(github.event.pull_request.labels.*.name, 'trusted_contributor'))
      )
    runs-on: cpu-runner-8c-32gb-01
    container: derskythe/github-runner-base:ubuntu-noble
    steps:
      - name: Wait for HF datasets cache on main
        if: github.repository_owner == 'Aleph-Alpha-Research' && github.ref == 'refs/heads/main'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: hf-datasets-cache
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && format('refs/pull/{0}/merge', github.event.pull_request.number) || '' }}
          fetch-depth: 0
      - name: Setup poetry
        uses: ./.github/actions/setup-poetry-on-ubuntu
      - name: Huggingface datasets cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HF_DATASET_CACHE_DIR }}
          key: hf-datasets-
      - name: Run tests
        run: |
          export HF_TOKEN=${{ secrets.HUGGINGFACE_API_KEY }}
          export HF_DATASET_CACHE_DIR=${{ env.HF_DATASET_CACHE_DIR }}
          export PATH=$HOME/.local/bin:$PATH
          poetry run python -c "import nltk; nltk.download('punkt_tab')"
          poetry run pytest -n auto --max-worker-restart=0 --durations=30 -v -m "not gpu and cpu_slow and not external_api"

  test-gpu:
    if: >
      github.repository_owner == 'Aleph-Alpha-Research' &&
      always() &&
      needs.test-cpu.result == 'success' &&
      needs.test-cpu-slow.result == 'success' &&
      (needs.build_regular.result == 'success' || needs.publish_fork_image.result == 'success')
    needs: [decide, build_regular, publish_fork_image, test-cpu, test-cpu-slow]
    runs-on: EvalFrameworkGPURunner
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Restore HF datasets cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HF_DATASET_CACHE_DIR }}
          key: hf-datasets-
      - name: Login to GHCR (owner)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull container image
        run: docker pull "${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ needs.decide.outputs.tag }}"
      - name: Run GPU tests inside container with GPU access
        run: |
          timeout 20m docker run --rm --gpus all \
            -v ${{ github.workspace }}:/eval_framework \
            -w /eval_framework \
            -e HF_DATASET_CACHE_DIR=${{ env.HF_DATASET_CACHE_DIR }} \
            "${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ needs.decide.outputs.tag }}" \
            bash -c 'poetry run pytest --durations=30 -v -m "gpu and not cpu_slow and not external_api and not vllm"'

  test-gpu-vllm:
    if: >
      github.repository_owner == 'Aleph-Alpha-Research' &&
      always() &&
      needs.test-cpu.result == 'success' &&
      needs.test-cpu-slow.result == 'success' &&
      (needs.build_regular.result == 'success' || needs.publish_fork_image.result == 'success')
    needs: [decide, build_regular, publish_fork_image, test-cpu, test-cpu-slow]
    runs-on: EvalFrameworkGPURunner
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Restore HF datasets cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.HF_DATASET_CACHE_DIR }}
          key: hf-datasets-
      - name: Login to GHCR (owner)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull container image
        run: docker pull "${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ needs.decide.outputs.tag }}"
      - name: Run GPU tests inside container with GPU access
        run: |
          timeout 20m docker run --rm --gpus all \
            -v ${{ github.workspace }}:/eval_framework \
            -w /eval_framework \
            -e VLLM_LOGGING_LEVEL=DEBUG \
            -e VLLM_WORKER_MULTIPROC_METHOD=spawn \
            -e VLLM_USE_MODELSCOPE=False \
            -e VLLM_NCCL_SO_PATH="" \
            -e VLLM_USE_TRITON_FLASH_ATTN=0 \
            -e VLLM_DISABLE_CUSTOM_ALL_REDUCE=1 \
            "${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:${{ needs.decide.outputs.tag }}" \
            bash -c 'curl -sSL https://install.python-poetry.org | python3 - && export PATH="$HOME/.local/bin:$PATH" && poetry --version && poetry run pytest --log-cli-level=INFO -v -m "vllm"'

  promote_latest_on_merge:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR (owner)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Promote pr-<PR>-<HEAD_SHA> -> latest (server-side retag)
        shell: bash
        run: |
          set -euo pipefail
          SRC="${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}"
          DEST="${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}:latest"
          if ! docker buildx imagetools inspect "$SRC" >/dev/null 2>&1; then
            echo "Source tag $SRC not found; skipping promotion."
            exit 0
          fi
          docker buildx imagetools create --tag "$DEST" "$SRC"
          echo "Promoted $SRC -> $DEST"

  cleanup_pr_images:
    needs: [promote_latest_on_merge]
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ env.OWNER_LC }}
      PACKAGE: eval_framework_public
    steps:
      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: Delete GHCR versions for this PR (org-owned)
        shell: bash
        run: |
          set -euo pipefail
          PREFIX="pr-${{ github.event.pull_request.number }}-"

          gh api -H "Accept: application/vnd.github+json" \
            "/orgs/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100" --paginate \
            --jq '.[] | {id: .id, tags: (.metadata.container.tags // [])}' \
          | jq -r --arg prefix "$PREFIX" '
              select([.tags[]? | select(startswith($prefix))] | length > 0)
              | .id
            ' \
          | xargs -r -n1 -I{} gh api -X DELETE -H "Accept: application/vnd.github+json" \
              "/orgs/${OWNER}/packages/container/${PACKAGE}/versions/{}"

          echo "Cleanup complete for PR #${{ github.event.pull_request.number }}"
