name: Renovate

# NOTE: dry-run test branch. Schedule trigger removed so this branch can only
# be invoked manually via workflow_dispatch. Revert before merging to main.
on:
  workflow_dispatch:
    inputs:
      log_level:
        description: "Renovate log level"
        required: false
        type: choice
        default: "debug"
        options:
          - "debug"
          - "info"
          - "warn"
          - "error"
      base_branch:
        description: "Branch to scan (defaults to main)"
        required: false
        type: string
        default: "main"

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.log_level || 'debug' }}
          RENOVATE_REPOSITORIES: "['Aleph-Alpha-Research/eval-framework']"
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: "ignored"
          RENOVATE_BASE_BRANCHES: "[\"${{ inputs.base_branch || 'main' }}\"]"
