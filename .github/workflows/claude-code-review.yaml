name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@30544b674398ee15c84819bd87caf8a87e8c7b55 # v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80

  claude-review:
    if: ${{ github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@30544b674398ee15c84819bd87caf8a87e8c7b55 # v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          show_full_output: true
          allowed_bots: "claude[bot]"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} for bugs, correctness issues, and bad style/patterns. See CLAUDE.md Code Review section for full guidance.

            **Prioritize these domain-specific checks:**
            1. Commit messages: are `feat`/`fix`/`perf`/`docs` types only used for user-facing changes? Flag any mismatches (CHANGELOG is auto-generated from commits).
            2. Framework integration: if adding tasks/metrics/models, are they properly registered and inherit from correct base classes? Do models implement the appropriate abstract methods?
            3. Tests: for significant code changes, flag if unit tests should be updated but weren't.

            Focus only on things that matter — do NOT comment on:
            - PR description accuracy or formatting
            - Minor nits (naming preferences, trivial style, missing docstrings, ...)
            - Things that are "worth considering" but not actually wrong

            Before reviewing, clean up obsolete prior feedback from `claude[bot]`:
            - Resolve unresolved review threads whose first comment is by `claude[bot]` and whose concern has been addressed (GraphQL `resolveReviewThread`). Leave unaddressed threads open.
            - Minimize prior top-level PR comments by `claude[bot]` with classifier `OUTDATED` (GraphQL `minimizeComment`).

            Post a single concise PR comment via `gh pr comment ${{ github.event.pull_request.number }} --body "..."`. Use inline comments only for actual bugs or important issues at specific lines. If everything looks good, just say "lgtm" in one sentence.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh api:*),Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment"
